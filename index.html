<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus | Temp Mail & Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #05060a;
            --card-glass: rgba(255, 255, 255, 0.03);
            --neon-blue: #00f0ff;
            --neon-purple: #bc13fe;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --error: #ff4d4d;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI Containers */
        main { flex: 1; padding: 1.5rem; overflow-y: auto; padding-bottom: 80px; }
        .view { display: none; animation: slideUp 0.3s ease-out; max-width: 800px; margin: 0 auto; }
        .view.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Bottom Nav */
        .mobile-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(10, 11, 16, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }

        /* Glass Cards */
        .glass-card {
            background: var(--card-glass); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 1.5rem; margin-bottom: 1.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .email-display {
            background: #000; border-radius: 12px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
            font-family: monospace; border: 1px solid #1e293b;
        }

        /* Buttons */
        .btn {
            background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer;
            transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-full { width: 100%; justify-content: center; }

        /* Email List & OTP */
        .email-item {
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 12px;
        }
        .otp-box {
            background: linear-gradient(45deg, rgba(0,240,255,0.1), rgba(188,19,254,0.1));
            border: 1px solid var(--neon-blue); padding: 15px; border-radius: 12px;
            text-align: center; margin-top: 10px;
        }
        .otp-code { font-size: 2.2rem; font-weight: 800; letter-spacing: 6px; color: var(--neon-blue); display: block; margin-bottom: 10px; }

        /* Toast Notifications */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: #000; padding: 10px 20px;
            border-radius: 30px; font-weight: bold; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

    <div id="toast">Copied!</div>

    <main>
        <section id="mail-view" class="view active">
            <h2 style="margin-bottom: 1rem;">Temp Inbox</h2>
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span id="timer" style="color: var(--error); font-size: 0.8rem;">Ready</span>
                    <button class="btn" style="padding: 8px 12px;" onclick="App.createInbox()">New Inbox</button>
                </div>
                <div class="email-display">
                    <span id="email-addr" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px;">Click New Inbox</span>
                    <i class="fas fa-copy" onclick="App.copy('email-addr')" style="cursor:pointer; color: var(--neon-blue)"></i>
                </div>
            </div>

            <div id="email-list">
                <div style="text-align: center; color: var(--text-dim); margin-top: 50px;">
                    <i class="fas fa-inbox fa-3x" style="margin-bottom: 15px;"></i>
                    <p>No messages yet. Waiting for incoming mail...</p>
                </div>
            </div>
        </section>

        <section id="call-view" class="view">
            <h2 style="margin-bottom: 1rem;">Secure Call</h2>
            <div class="glass-card">
                <label style="color: var(--text-dim); font-size: 0.8rem;">Your Peer ID</label>
                <div class="email-display" style="margin: 8px 0;">
                    <span id="my-id">Initializing...</span>
                    <i class="fas fa-copy" onclick="App.copy('my-id')" style="color: var(--neon-blue)"></i>
                </div>
            </div>

            <div class="glass-card">
                <input type="text" id="remote-id" placeholder="Enter Friend's ID" style="width:100%; background: #000; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; margin-bottom:15px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn" onclick="Calls.startCall()"><i class="fas fa-phone"></i> Call</button>
                    <button class="btn" style="border-color: var(--neon-purple); color: var(--neon-purple);" onclick="Calls.random()"><i class="fas fa-random"></i> Random</button>
                </div>
            </div>

            <div id="call-active" class="glass-card" style="display:none; border-color: var(--success);">
                <div style="text-align: center;">
                    <h3 id="call-status">Connected</h3>
                    <div id="recording-indicator" style="color: var(--error); margin: 10px 0;"><i class="fas fa-record-vinyl fa-spin"></i> Recording...</div>
                    <button class="btn" style="border-color: var(--error); color: var(--error);" onclick="Calls.endCall()">End Call</button>
                    <div id="playback-area" style="margin-top:15px; display:none;">
                        <audio id="audio-out" controls style="width: 100%;"></audio>
                    </div>
                </div>
            </div>
        </section>

        <section id="history-view" class="view">
            <h2 style="margin-bottom: 1rem;">History</h2>
            <div id="history-container"></div>
            <button class="btn btn-full" style="margin-top:20px; border-color:var(--error); color:var(--error)" onclick="App.clearHistory()">Clear History</button>
        </section>
    </main>

    <nav class="mobile-nav">
        <div class="nav-item active" onclick="App.switch('mail-view', this)">
            <i class="fas fa-envelope"></i><span>Mail</span>
        </div>
        <div class="nav-item" onclick="App.switch('call-view', this)">
            <i class="fas fa-phone-alt"></i><span>Call</span>
        </div>
        <div class="nav-item" onclick="App.switch('history-view', this)">
            <i class="fas fa-history"></i><span>History</span>
        </div>
    </nav>

    <script>
        const API_KEY = "sk_FllbN62B80svK5hF_waWY0lEYgzVGd2EHeVU70ksxQ7kbSeJe7obqeGMuzlJuxM9va47TR0pL7wJNiOGC";
        const OTP_REGEX = /\b\d{4,8}\b/;

        const App = {
            inbox: null,
            timer: 30 * 60,

            init() {
                const saved = JSON.parse(localStorage.getItem('nexus_inbox') || 'null');
                if(saved) this.loadInbox(saved.id, saved.emailAddress);
                this.renderHistory();
            },

            async createInbox() {
                const res = await fetch('https://api.mailslurp.com/inboxes', {
                    method: 'POST',
                    headers: { 'x-api-key': API_KEY, 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                this.loadInbox(data.id, data.emailAddress);
                this.saveHistory(data);
            },

            loadInbox(id, email) {
                this.inbox = { id, email };
                document.getElementById('email-addr').innerText = email;
                localStorage.setItem('nexus_inbox', JSON.stringify({id, emailAddress: email}));
                this.startRefresh();
            },

            startRefresh() {
                if(window.refreshInt) clearInterval(window.refreshInt);
                window.refreshInt = setInterval(() => this.checkMail(), 5000);
                this.checkMail();
            },

            async checkMail() {
                if(!this.inbox) return;
                const res = await fetch(`https://api.mailslurp.com/inboxes/${this.inbox.id}/emails`, {
                    headers: { 'x-api-key': API_KEY }
                });
                const emails = await res.json();
                this.renderEmails(emails);
            },

            async renderEmails(emails) {
                const container = document.getElementById('email-list');
                if(emails.length === 0) return;

                let html = '';
                for(let em of emails) {
                    // Fetch full email content to find hidden OTPs
                    const fullRes = await fetch(`https://api.mailslurp.com/emails/${em.id}`, {
                        headers: { 'x-api-key': API_KEY }
                    });
                    const fullEm = await fullRes.json();
                    
                    const otp = fullEm.body.match(OTP_REGEX) || em.subject.match(OTP_REGEX);
                    
                    html += `
                        <div class="email-item">
                            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-dim);">
                                <span>From: ${em.from || 'System'}</span>
                                <span>${new Date(em.createdAt).toLocaleTimeString()}</span>
                            </div>
                            <div style="margin: 8px 0; font-weight:600;">${em.subject}</div>
                            ${otp ? `
                                <div class="otp-box">
                                    <span class="otp-code" id="otp-${em.id}">${otp[0]}</span>
                                    <button class="btn btn-full" onclick="App.copy('otp-${em.id}')">Copy Code</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                container.innerHTML = html;
            },

            copy(id) {
                const text = document.getElementById(id).innerText;
                navigator.clipboard.writeText(text);
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            },

            switch(viewId, el) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                el.classList.add('active');
            },

            saveHistory(data) {
                let history = JSON.parse(localStorage.getItem('nexus_history') || '[]');
                history.unshift(data);
                localStorage.setItem('nexus_history', JSON.stringify(history.slice(0, 10)));
                this.renderHistory();
            },

            renderHistory() {
                const history = JSON.parse(localStorage.getItem('nexus_history') || '[]');
                document.getElementById('history-container').innerHTML = history.map(h => `
                    <div class="glass-card" style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.8rem;">${h.emailAddress}</span>
                        <button class="btn" style="padding:5px 10px;" onclick="App.loadInbox('${h.id}', '${h.emailAddress}')">Use</button>
                    </div>
                `).join('');
            },

            clearHistory() {
                localStorage.clear();
                location.reload();
            }
        };

        const Calls = {
            peer: null,
            conn: null,
            recorder: null,
            chunks: [],

            init() {
                this.peer = new Peer('nexus-' + Math.floor(Math.random()*10000));
                this.peer.on('open', id => document.getElementById('my-id').innerText = id);
                this.peer.on('call', async call => {
                    if(confirm("Incoming Call?")) {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        call.answer(stream);
                        this.handleStream(call);
                    }
                });
            },

            async startCall() {
                const id = document.getElementById('remote-id').value;
                if(!id) return;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const call = this.peer.call(id, stream);
                this.handleStream(call);
            },

            handleStream(call) {
                document.getElementById('call-active').style.display = 'block';
                call.on('stream', remoteStream => {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                    this.startRec(remoteStream);
                });
            },

            startRec(stream) {
                this.chunks = [];
                this.recorder = new MediaRecorder(stream);
                this.recorder.ondataavailable = e => this.chunks.push(e.data);
                this.recorder.onstop = () => {
                    const blob = new Blob(this.chunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('audio-out').src = url;
                    document.getElementById('playback-area').style.display = 'block';
                };
                this.recorder.start();
            },

            endCall() {
                location.reload(); // Simplest way to reset WebRTC state
            },

            random() {
                alert("Searching for users... No matches found in your region yet.");
            }
        };

        App.init();
        Calls.init();
    </script>
</body>
</html>
